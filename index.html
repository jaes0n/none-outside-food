<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>카페 안내 멘트</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
      font-family: sans-serif;
    }

    button {
      width: 80vw;

      height: 25vh;
      
      font-size: 40px;
      border: none;
      border-radius: 12px;
      background-color: #6b4f4f;
      color: white;
      cursor: pointer;
    }

    button:active {
      background-color: #4a3535;
    }
  </style>
</head>
<body>

  <button onclick="speakMessage()">
    🔊 안내 멘트 재생
  </button>

  <script>
    function speakMessage() {
      const message = new SpeechSynthesisUtterance(
        "고객님.   외부 음식 취식은 불가능합니다. 양해 부탁드립니다."
      );

      message.lang = "ko-KR";
      message.rate = 1;
      message.pitch = 1;

      window.speechSynthesis.speak(message);
    }
  </script>

</body>
</html>
